<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Postcard Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Caveat:wght@500&family=Kalam&family=Playfair+Display:ital,wght@0,600;1,600&family=Homemade+Apple&family=Instrument+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;700&family=Special+Elite&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: #f6f4ee; font-family: 'Instrument Sans', sans-serif; color: #1c1a17; }
  input, textarea, select, button { font-family: inherit; }

  @keyframes stampIn { 0% { transform: scale(1.6) rotate(-22deg); opacity: 0; } 60% { transform: scale(0.94) rotate(-7deg); opacity: 1; } 100% { transform: scale(1) rotate(-8deg); opacity: 1; } }
  @keyframes riseIn { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes cardIn { 0% { transform: translateY(-24px) rotate(-2.5deg); } 100% { transform: translateY(0) rotate(0deg); } }
  @keyframes photoIn { from { transform: scale(1.04); } to { transform: scale(1); } }
  ::placeholder { color: #aaa59b; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .app { display: flex; min-height: 100vh; min-height: 100dvh; }

  /* LEFT: control panel */
  .panel { width: 392px; flex: 0 0 392px; background: #fdfcfa; border-right: 1px solid #e3e0d8; padding: 30px 28px 40px; overflow-y: auto; height: 100vh; height: 100dvh; -webkit-overflow-scrolling: touch; }
  .brand { animation: riseIn 400ms ease-out both; }
  .brand-title { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; font-size: 27px; letter-spacing: -0.3px; }
  .brand-sub { font-size: 12.5px; color: #6f6a62; margin-top: 3px; margin-bottom: 24px; }

  .tabs { position: relative; display: flex; background: #f0eee6; padding: 4px; border-radius: 999px; margin-bottom: 26px; animation: riseIn 400ms 60ms ease-out both; }
  .tabs-pill { position: absolute; top: 4px; bottom: 4px; width: calc(50% - 4px); left: 4px; background: #1c1a17; border-radius: 999px; transition: left 260ms cubic-bezier(0.3,1.2,0.4,1); }
  .tab-btn { position: relative; flex: 1; text-align: center; padding: 10px 0; font-size: 12.5px; letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; font-weight: 600; color: #1c1a17; transition: color 260ms; background: none; border: none; }
  .tab-btn:active { transform: scale(0.97); }
  .tab-btn.is-active { color: #fff; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.6px; color: #79746b; margin-bottom: 10px; }

  .form-side { animation: riseIn 320ms ease-out both; }
  .form-side[hidden] { display: none; }

  .style-row { display: flex; gap: 8px; margin-bottom: 26px; }
  .style-opt { flex: 1; padding: 12px 6px 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1.5px solid #e3e0d8; background: #fff; transition: all 200ms; }
  .style-opt:hover { transform: translateY(-2px); }
  .style-opt:active { transform: scale(0.97); }
  .style-opt.is-active { border-color: #1c1a17; background: #f3f1ea; }
  .style-opt-aa { font-size: 17px; line-height: 1; }
  .style-opt-dots { display: flex; gap: 3px; justify-content: center; margin: 7px 0 6px; }
  .style-opt-dot { width: 10px; height: 10px; border-radius: 50%; }
  .style-opt-label { font-size: 11.5px; font-weight: 600; color: #1c1a17; }

  .dropzone { border: 1.5px dashed #bcb7ad; border-radius: 14px; padding: 20px; text-align: center; font-size: 12.5px; color: #6f6a62; cursor: pointer; margin-bottom: 26px; background: #faf9f5; transition: all 200ms; }
  .dropzone:hover { border-color: #1c1a17; background: #f4f2ec; }

  .field-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #d8d5ce; font-family: 'Instrument Sans', sans-serif; font-size: 16px; margin-bottom: 26px; background: #fff; transition: all 200ms; outline: none; }
  .field-input:focus { border-color: #1c1a17; box-shadow: 0 0 0 3px rgba(28,26,23,0.07); }

  .swatch-row { display: flex; gap: 10px; margin-bottom: 26px; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all 180ms cubic-bezier(0.3,1.4,0.5,1); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); outline: 2px solid transparent; outline-offset: 2px; }
  .swatch:hover { transform: scale(1.12); }
  .swatch:active { transform: scale(0.94); }
  .swatch.is-active { outline-color: #1c1a17; transform: scale(1.05); }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 9px 14px; border-radius: 999px; font-size: 12px; cursor: pointer; font-weight: 600; border: 1.5px solid #d8d5ce; background: #fff; color: #1c1a17; transition: all 180ms; }
  .chip:hover { transform: translateY(-1px); }
  .chip:active { transform: scale(0.96); }
  .chip.is-active { border-color: #1c1a17; background: #1c1a17; color: #fff; }

  .two-col { display: flex; gap: 10px; margin-bottom: 22px; }
  .two-col > div { flex: 1; }

  .stamp-row { display: flex; gap: 8px; margin-bottom: 26px; }
  .stamp-opt { flex: 1; padding: 10px 4px; border-radius: 12px; text-align: center; font-size: 11.5px; cursor: pointer; font-weight: 600; border: 1.5px solid #d8d5ce; background: #fff; color: #1c1a17; transition: all 180ms; }
  .stamp-opt:hover { transform: translateY(-1px); }
  .stamp-opt:active { transform: scale(0.96); }
  .stamp-opt.is-active { border-color: #1c1a17; background: #1c1a17; color: #fff; }

  textarea.field-input { resize: vertical; line-height: 1.5; }

  /* RIGHT: preview desk */
  .desk { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 20px; padding: 40px; background: radial-gradient(ellipse at 50% 30%, #f3f1ea, #e8e5dd); position: relative; overflow: hidden; }

  .card-stage { flex: 1 1 auto; min-height: 0; min-width: 0; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }

  .desk-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; animation: riseIn 400ms 120ms ease-out both; }
  .flip-btn { padding: 11px 20px; border-radius: 999px; border: 1.5px solid #1c1a17; background: transparent; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.2px; color: #1c1a17; transition: all 180ms; }
  .flip-btn:hover { background: #1c1a17; color: #fff; transform: translateY(-1px); }
  .flip-btn:active { transform: scale(0.97); }

  .download-group { display: flex; align-items: center; border-radius: 999px; border: 1.5px solid #1c1a17; background: #1c1a17; color: #fff; overflow: hidden; transition: all 180ms; }
  .download-group:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(28,26,23,0.25); }
  .download-btn { padding: 11px 14px 11px 20px; border: 0; background: transparent; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.2px; }
  .download-btn:active { transform: scale(0.97); }
  .download-format { height: 40px; border: 0; border-left: 1px solid rgba(255,255,255,0.25); background: #1c1a17; color: #fff; font-size: 12px; font-weight: 700; padding: 0 24px 0 10px; cursor: pointer; outline: none; }

  .preview-wrap { perspective: 1400px; display: flex; align-items: center; justify-content: center; max-width: 100%; animation: cardIn 550ms 180ms cubic-bezier(0.2,0.9,0.3,1) both; }

  .card { flex: 0 0 auto; position: relative; box-shadow: 0 24px 50px -14px rgba(40,32,20,0.4); transition: transform 150ms ease-in-out, opacity 150ms; }

  .card-layer { position: absolute; inset: 0; overflow: hidden; }
  .card-layer[hidden] { display: none; }

  .photo-img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: grab; touch-action: none; animation: photoIn 400ms ease-out both; }
  .photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .photo-placeholder-tag { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: rgba(0,0,0,0.45); background: rgba(255,255,255,0.65); padding: 7px 12px; border-radius: 6px; }

  .title-overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 20px 24px; background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0)); }
  .title-text { font-size: 34px; line-height: 1.12; text-shadow: 0 2px 12px rgba(0,0,0,0.45); }

  .postmark { position: absolute; pointer-events: none; mix-blend-mode: multiply; animation: stampIn 380ms cubic-bezier(0.2,1.3,0.4,1) both; }
  .postmark[hidden] { display: none; }
  .pm-inner { display: flex; align-items: center; width: 150px; height: 92px; }
  .pm-boxed { padding: 8px 12px; transform: rotate(-4deg); border: 2px solid; }
  .pm-boxed[hidden] { display: none; }
  .pm-boxed-text { font-family: 'Special Elite', monospace; font-size: 12px; letter-spacing: 2px; white-space: nowrap; }
  .pm-boxed-line { height: 1.5px; opacity: 0.6; margin-top: 4px; }
  .pm-boxed-date { font-family: 'Special Elite', monospace; font-size: 9px; letter-spacing: 1px; opacity: 0.8; margin-top: 3px; }
  .pm-round { position: relative; width: 88px; height: 88px; border-radius: 50%; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 0 0 auto; }
  .pm-round[hidden] { display: none; }
  .pm-rings { position: absolute; inset: 5px; border-radius: 50%; border-style: dashed; border-width: 1.5px; opacity: 0.7; }
  .pm-rings[hidden] { display: none; }
  .pm-round-text { font-family: 'Special Elite', monospace; font-size: 9px; letter-spacing: 1px; line-height: 1.25; padding: 0 8px; }
  .pm-round-line { width: 32px; height: 1px; opacity: 0.6; margin: 4px 0; }
  .pm-round-date { font-family: 'Special Elite', monospace; font-size: 8.5px; opacity: 0.85; }
  .pm-bars { display: flex; flex-direction: column; gap: 6px; margin-left: 6px; flex: 1; }
  .pm-bars[hidden] { display: none; }
  .pm-bar { height: 2px; opacity: 0.75; border-radius: 2px; }

  .retro-corner-tl { position: absolute; top: 0; left: 0; width: 0; height: 0; border-style: solid; border-width: 36px 36px 0 0; border-color: transparent transparent transparent transparent; }
  .retro-corner-br { position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 0 36px 36px; border-color: transparent transparent transparent transparent; }
  .retro-corner-tl[hidden], .retro-corner-br[hidden] { display: none; }

  .card-back { position: absolute; inset: 0; padding: 24px; }
  .back-label { position: absolute; left: 0; right: 0; top: 16px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 6px; }
  .back-divider { position: absolute; left: 56%; top: 44px; bottom: 24px; width: 1px; }
  .back-left { position: absolute; left: 24px; top: 48px; width: calc(56% - 46px); bottom: 24px; display: flex; flex-direction: column; }
  .message-text { flex: 1; overflow: hidden; white-space: pre-wrap; line-height: 1.4; }
  .from-line { opacity: 0.8; margin-top: 6px; font-size: 20px; }

  .stamp { position: absolute; right: 24px; top: 44px; width: 96px; height: 76px; box-sizing: border-box; box-shadow: 0 2px 8px rgba(0,0,0,0.18); animation: stampIn 380ms cubic-bezier(0.2,1.3,0.4,1) both; }
  .stamp[hidden] { display: none; }
  .stamp-sunset { position: absolute; left: 50%; top: 50%; width: 26px; height: 26px; border-radius: 50%; background: #ffe08a; transform: translate(-50%,-50%); }
  .stamp-sunset-line { position: absolute; left: 6px; right: 6px; top: 60%; height: 2px; background: rgba(255,255,255,0.65); }
  .stamp-mountain-1 { position: absolute; left: 16px; bottom: 12px; width: 0; height: 0; border-style: solid; border-width: 0 15px 22px 15px; border-color: transparent transparent #dfe9ef transparent; }
  .stamp-mountain-2 { position: absolute; left: 36px; bottom: 12px; width: 0; height: 0; border-style: solid; border-width: 0 19px 30px 19px; border-color: transparent transparent #ffffff transparent; }
  .stamp-icon[hidden] { display: none; }

  .to-block { position: absolute; right: 24px; top: 170px; width: 190px; }
  .to-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; margin-bottom: 2px; }
  .to-value { border-bottom: 1px solid; font-size: 20px; padding: 2px 2px 4px; min-height: 24px; }
  .to-blank { border-bottom: 1px solid; height: 30px; }

  .side-caption { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: #827d73; animation: riseIn 400ms 260ms ease-out both; text-align: center; }

  /* RESPONSIVE: tablet & mobile — stack the panel above the preview */
  @media (max-width: 880px) {
    .app { flex-direction: column; min-height: 100vh; min-height: 100dvh; height: auto; }
    .panel { width: 100%; flex: 0 0 auto; height: auto; max-height: 46vh; max-height: 46dvh; border-right: none; border-bottom: 1px solid #e3e0d8; padding: 22px 20px 24px; }
    .desk { flex: 1 1 auto; min-height: 320px; padding: 20px 16px; gap: 14px; }
    .brand-title { font-size: 23px; }
    .style-row { gap: 6px; }
    .swatch { width: 34px; height: 34px; }
    .swatch-row { gap: 12px; flex-wrap: wrap; }
    .chip, .stamp-opt { padding: 10px 14px; }
    .desk-controls { width: 100%; }
    .flip-btn, .download-group { flex: 1 1 auto; justify-content: center; }
    .download-btn { flex: 1; text-align: center; }
  }

  @media (max-width: 520px) {
    .panel { max-height: 50vh; max-height: 50dvh; padding: 18px 16px 20px; }
    .brand-sub { font-size: 12px; margin-bottom: 18px; }
    .section-label { margin-bottom: 8px; }
    .style-row, .stamp-row { gap: 6px; margin-bottom: 20px; }
    .style-opt { padding: 10px 4px 8px; }
    .field-input { margin-bottom: 20px; padding: 11px 12px; }
    .two-col { gap: 8px; margin-bottom: 18px; }
    .desk { padding: 16px 12px; gap: 10px; }
    .flip-btn { padding: 11px 16px; font-size: 12.5px; }
    .download-btn { padding: 11px 10px 11px 16px; font-size: 12.5px; }
    .download-format { padding: 0 18px 0 8px; }
    .side-caption { font-size: 10px; }
  }

</style>
</head>
<body>
<div class="app">

  <!-- LEFT: control panel -->
  <div class="panel" id="panel">
    <div class="brand">
      <div class="brand-title">Postcard Studio</div>
      <div class="brand-sub">Compose, flip, and mail-worthy in minutes.</div>
    </div>

    <div class="tabs">
      <div class="tabs-pill" id="tabsPill"></div>
      <button type="button" class="tab-btn is-active" id="tabFrontBtn">Front</button>
      <button type="button" class="tab-btn" id="tabBackBtn">Back</button>
    </div>

    <div class="form-side" id="formFront">
      <div class="section-label">Style</div>
      <div class="style-row" id="styleRow"></div>

      <div class="section-label">Photo</div>
      <div class="dropzone" id="dropzone">
        <span id="photoLabel">Click or drop an image here</span>
        <input type="file" accept="image/*" id="fileInput" style="display:none">
      </div>

      <div class="section-label">Title</div>
      <input type="text" id="titleInput" class="field-input" placeholder="Greetings from...">

      <div class="section-label">Title Color</div>
      <div class="swatch-row" id="swatchRow"></div>

      <div class="section-label">Postmark</div>
      <div class="chip-row" id="frontPostmarkRow"></div>
    </div>

    <div class="form-side" id="formBack" hidden>
      <div class="two-col">
        <div>
          <div class="section-label">From</div>
          <input type="text" id="fromInput" class="field-input" placeholder="Your name" style="margin-bottom:0">
        </div>
        <div>
          <div class="section-label">To</div>
          <input type="text" id="toInput" class="field-input" placeholder="Recipient" style="margin-bottom:0">
        </div>
      </div>

      <div class="section-label">Message</div>
      <textarea id="messageInput" class="field-input" placeholder="Wish you were here..." rows="5"></textarea>

      <div class="section-label">Postage Stamp</div>
      <div class="stamp-row" id="stampRow"></div>

      <div class="section-label">Postmark</div>
      <div class="chip-row" id="backPostmarkRow"></div>
    </div>
  </div>

  <!-- RIGHT: preview desk -->
  <div class="desk">
    <div class="desk-controls">
      <button type="button" class="flip-btn" id="flipBtn">Flip card</button>
      <div class="download-group">
        <button type="button" class="download-btn" id="downloadBtn">Download PNG</button>
        <select id="downloadFormat" class="download-format">
          <option value="png">PNG</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
    </div>

    <div class="card-stage" id="cardStage">
    <div class="preview-wrap" id="previewWrap">
      <div class="card" id="card" data-postcard-export="true">

        <div class="card-layer" id="cardFront">
          <img id="photoImg" class="photo-img" draggable="false" hidden>
          <div class="photo-placeholder" id="photoPlaceholder">
            <div class="photo-placeholder-tag">drop a photo here</div>
          </div>

          <div class="title-overlay">
            <div class="title-text" id="titleText"></div>
          </div>

          <div class="postmark" id="frontPostmark" style="top:18px;right:18px">
            <div class="pm-inner">
              <div class="pm-boxed" id="frontPmBoxed">
                <div class="pm-boxed-text" id="frontPmBoxedText"></div>
                <div class="pm-boxed-line" id="frontPmBoxedLine"></div>
                <div class="pm-boxed-date" id="frontPmBoxedDate"></div>
              </div>
              <div class="pm-round" id="frontPmRound">
                <div class="pm-rings" id="frontPmRings"></div>
                <div class="pm-round-text" id="frontPmRoundText"></div>
                <div class="pm-round-line" id="frontPmRoundLine"></div>
                <div class="pm-round-date" id="frontPmRoundDate"></div>
              </div>
              <div class="pm-bars" id="frontPmBars">
                <div class="pm-bar" id="frontPmBar1" style="width:100%"></div>
                <div class="pm-bar" id="frontPmBar2" style="width:88%"></div>
                <div class="pm-bar" id="frontPmBar3" style="width:100%"></div>
                <div class="pm-bar" id="frontPmBar4" style="width:72%"></div>
              </div>
            </div>
          </div>

          <div class="retro-corner-tl" id="retroCornerTl"></div>
          <div class="retro-corner-br" id="retroCornerBr"></div>
        </div>

        <div class="card-layer" id="cardBack" hidden>
          <div class="card-back">
            <div class="back-label" id="backLabel">POST&nbsp;CARD</div>
            <div class="back-divider" id="backDivider"></div>

            <div class="back-left">
              <div class="message-text" id="messageText"></div>
              <div class="from-line" id="fromLineText"></div>
            </div>

            <div class="stamp" id="stamp">
              <div class="stamp-icon" id="stampSunset">
                <div class="stamp-sunset"></div>
                <div class="stamp-sunset-line"></div>
              </div>
              <div class="stamp-icon" id="stampMountain">
                <div class="stamp-mountain-1"></div>
                <div class="stamp-mountain-2"></div>
              </div>
            </div>

            <div class="postmark" id="backPostmark" style="right:86px;top:78px">
              <div class="pm-inner">
                <div class="pm-boxed" id="backPmBoxed">
                  <div class="pm-boxed-text" id="backPmBoxedText"></div>
                  <div class="pm-boxed-line" id="backPmBoxedLine"></div>
                  <div class="pm-boxed-date" id="backPmBoxedDate"></div>
                </div>
                <div class="pm-round" id="backPmRound">
                  <div class="pm-rings" id="backPmRings"></div>
                  <div class="pm-round-text" id="backPmRoundText"></div>
                  <div class="pm-round-line" id="backPmRoundLine"></div>
                  <div class="pm-round-date" id="backPmRoundDate"></div>
                </div>
                <div class="pm-bars" id="backPmBars">
                  <div class="pm-bar" id="backPmBar1" style="width:100%"></div>
                  <div class="pm-bar" id="backPmBar2" style="width:88%"></div>
                  <div class="pm-bar" id="backPmBar3" style="width:100%"></div>
                  <div class="pm-bar" id="backPmBar4" style="width:72%"></div>
                </div>
              </div>
            </div>

            <div class="to-block">
              <div class="to-label" id="toLabel">TO</div>
              <div class="to-value" id="toValueText"></div>
              <div class="to-blank"></div>
              <div class="to-blank"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
    </div>

    <div class="side-caption" id="sideCaption">— FRONT · 6×4 IN —</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  var CARD_W = 600, CARD_H = 380;

  var STYLE_DEFS = {
    modern: {
      label: 'Modern',
      paper: '#f4f1ea',
      ink: '#1d2129',
      inkFaint: 'rgba(29,33,41,0.28)',
      accent: '#3b5bdb',
      accent2: '#3b5bdb',
      titleFontFamily: "'Space Grotesk', sans-serif",
      titleFontStyle: 'normal',
      titleFontWeight: '700',
      handFontFamily: "'Caveat', cursive",
      handFontSize: '25px',
      border: '2px solid #1d2129',
      clip: false,
      stripe1: '#e9e5db', stripe2: '#dcd6c8'
    },
    retro: {
      label: 'Retro',
      paper: '#f2e6c9',
      ink: '#33301f',
      inkFaint: 'rgba(51,48,31,0.3)',
      accent: '#c1502e',
      accent2: '#0f5257',
      titleFontFamily: "'Bungee', cursive",
      titleFontStyle: 'normal',
      titleFontWeight: '400',
      handFontFamily: "'Kalam', cursive",
      handFontSize: '20px',
      border: '6px solid #0f5257',
      clip: false,

  // Builds a print-ready, standard-postcard-size (6x4in) PDF with the front
  // on page 1 and the back on page 2. JPEGs are embedded as-is via the
  // PDF DCTDecode filter (no re-encoding needed), which keeps this a small,
  // dependency-free writer instead of pulling in a PDF library.
  function canvasesToPdfBlob(frontCanvas, backCanvas) {
    return Promise.all([
      new Promise(function (resolve) { frontCanvas.toBlob(resolve, 'image/jpeg', 0.95); }),
      new Promise(function (resolve) { backCanvas.toBlob(resolve, 'image/jpeg', 0.95); })
    ]).then(function (blobs) {
      var frontBlob = blobs[0], backBlob = blobs[1];
      if (!frontBlob || !backBlob) throw new Error('Could not create the PDF pages.');
      return Promise.all([frontBlob.arrayBuffer(), backBlob.arrayBuffer()]);
    }).then(function (buffers) {
      var frontBytes = new Uint8Array(buffers[0]);
      var backBytes = new Uint8Array(buffers[1]);

      var POINTS_PER_INCH = 72;
      var pageW = 6 * POINTS_PER_INCH;
      var pageH = 4 * POINTS_PER_INCH;

      var enc = new TextEncoder();
      var chunks = [];
      var offset = 0;
      var offsets = [];
      function pushText(str) { var b = enc.encode(str); chunks.push(b); offset += b.length; }
      function pushBytes(b) { chunks.push(b); offset += b.length; }
      function startObj(n) { offsets[n] = offset; pushText(n + ' 0 obj\n'); }

      pushText('%PDF-1.4\n');

      startObj(1);
      pushText('<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');

      startObj(2);
      pushText('<< /Type /Pages /Kids [3 0 R 4 0 R] /Count 2 >>\nendobj\n');

      startObj(3);
      pushText('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + pageW + ' ' + pageH + '] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 7 0 R >>\nendobj\n');

      startObj(4);
      pushText('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + pageW + ' ' + pageH + '] /Resources << /XObject << /Im1 6 0 R >> >> /Contents 8 0 R >>\nendobj\n');

      startObj(5);
      pushText('<< /Type /XObject /Subtype /Image /Width ' + frontCanvas.width + ' /Height ' + frontCanvas.height + ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + frontBytes.length + ' >>\nstream\n');
      pushBytes(frontBytes);
      pushText('\nendstream\nendobj\n');

      startObj(6);
      pushText('<< /Type /XObject /Subtype /Image /Width ' + backCanvas.width + ' /Height ' + backCanvas.height + ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + backBytes.length + ' >>\nstream\n');
      pushBytes(backBytes);
      pushText('\nendstream\nendobj\n');

      var content1 = 'q ' + pageW + ' 0 0 ' + pageH + ' 0 0 cm /Im0 Do Q';
      startObj(7);
      pushText('<< /Length ' + content1.length + ' >>\nstream\n' + content1 + '\nendstream\nendobj\n');

      var content2 = 'q ' + pageW + ' 0 0 ' + pageH + ' 0 0 cm /Im1 Do Q';
      startObj(8);
      pushText('<< /Length ' + content2.length + ' >>\nstream\n' + content2 + '\nendstream\nendobj\n');

      var xrefStart = offset;
      var objCount = 9;
      pushText('xref\n0 ' + objCount + '\n0000000000 65535 f \n');
      for (var i = 1; i < objCount; i++) {
        pushText(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      }
      pushText('trailer\n<< /Size ' + objCount + ' /Root 1 0 R >>\nstartxref\n' + xrefStart + '\n%%EOF');

      return new Blob(chunks, { type: 'application/pdf' });
    });
  }

  function downloadPdf() {

      state.shownSide = 'back';

    });

  // --- main sync: apply state to DOM ---
  function sync() {
    var s = state;
    var def = STYLE_DEFS[s.style];
    var isRetro = s.style === 'retro';
    var isVintage = s.style === 'vintage';
    var frontPm = POSTMARK_DEFS[s.frontPostmark];
    var backPm = POSTMARK_DEFS[s.backPostmark];
    var dateLabel = todayLabel();

    // tabs

    els.tabFrontBtn.classList.toggle('is-active', s.side === 'front');
    els.tabBackBtn.classList.toggle('is-active', s.side === 'back');
    els.formFront.hidden = s.side !== 'front';
    els.formBack.hidden = s.side !== 'back';

    // style options
    Array.prototype.forEach.call(els.styleRow.children, function (btn) {
      btn.classList.toggle('is-active', btn.dataset.style === s.style);
    });

    // photo
    els.photoLabel.textContent = s.photo ? 'Photo set — click or drop to replace (drag the photo in the card to reposition)' : 'Click or drop an image here';
    if (s.photo) {
      els.photoImg.src = s.photo;
      els.photoImg.hidden = false;
      els.photoPlaceholder.hidden = true;
      els.photoImg.style.objectPosition = Math.round(s.photoPosX) + '% ' + Math.round(s.photoPosY) + '%';
    } else {
      els.photoImg.hidden = true;
      els.photoPlaceholder.hidden = false;
      els.photoPlaceholder.style.background = 'repeating-linear-gradient(135deg, ' + def.stripe1 + ' 0 14px, ' + def.stripe2 + ' 14px 28px)';
    }

    // title (avoid clobbering focus/cursor while typing)
    if (document.activeElement !== els.titleInput) els.titleInput.value = s.title;
    els.titleText.textContent = s.title;
    els.titleText.style.fontFamily = def.titleFontFamily;
    els.titleText.style.fontStyle = def.titleFontStyle;
    els.titleText.style.fontWeight = def.titleFontWeight;
    els.titleText.style.color = s.textColor;

    // color swatches
    Array.prototype.forEach.call(els.swatchRow.children, function (sw) {
      sw.classList.toggle('is-active', sw.dataset.hex === s.textColor);
    });

    // postmark chip rows
    Array.prototype.forEach.call(els.frontPostmarkRow.children, function (chip) {
      chip.classList.toggle('is-active', chip.dataset.value === s.frontPostmark);
    });
    Array.prototype.forEach.call(els.backPostmarkRow.children, function (chip) {
      chip.classList.toggle('is-active', chip.dataset.value === s.backPostmark);
    });

    // stamp row
    Array.prototype.forEach.call(els.stampRow.children, function (opt) {
      opt.classList.toggle('is-active', opt.dataset.value === s.postageStamp);
    });

    // from / to / message
    if (document.activeElement !== els.fromInput) els.fromInput.value = s.fromVal;
    if (document.activeElement !== els.toInput) els.toInput.value = s.toVal;
    if (document.activeElement !== els.messageInput) els.messageInput.value = s.message;

    // download button
    els.downloadFormat.value = s.downloadFormat;
    els.downloadBtn.textContent = s.downloading ? 'Exporting…' : ('Download ' + s.downloadFormat.toUpperCase());

    // card container
    els.card.style.width = CARD_W + 'px';
    els.card.style.height = CARD_H + 'px';
    els.card.style.background = def.paper;
    els.card.style.border = def.border;
    els.card.style.clipPath = isVintage ? scallopPath(CARD_W, CARD_H, 16, 5) : 'none';
    applyCardTransform();

    // front / back layer visibility
    els.cardFront.hidden = s.shownSide !== 'front';
    els.cardBack.hidden = s.shownSide !== 'back';
    els.sideCaption.textContent = s.shownSide === 'front' ? '— FRONT · 6×4 IN —' : '— BACK · 6×4 IN —';

    // front postmark
    els.frontPostmark.hidden = s.frontPostmark === 'none';
    if (frontPm) {
      var fBoxed = frontPm.variant === 'boxed';
      var fRings = frontPm.variant === 'rings';
      var fBars = frontPm.variant === 'bars';
      els.frontPmBoxed.hidden = !fBoxed;
      els.frontPmRound.hidden = fBoxed;
      els.frontPmRings.hidden = !fRings;
      els.frontPmBars.hidden = !fBars;
      [els.frontPmBoxedText, els.frontPmBoxedLine, els.frontPmBoxedDate,
       els.frontPmRound, els.frontPmRings, els.frontPmRoundText, els.frontPmRoundLine, els.frontPmRoundDate].forEach(function (el) { el.style.color = frontPm.color; el.style.borderColor = frontPm.color; });
      els.frontPmBoxedLine.style.background = frontPm.color;
      els.frontPmRoundLine.style.background = frontPm.color;
      Array.prototype.forEach.call(els.frontPmBars.children, function (bar) { bar.style.background = frontPm.color; });
      els.frontPmBoxedText.textContent = frontPm.text;
      els.frontPmRoundText.textContent = frontPm.text;
      els.frontPmBoxedDate.textContent = dateLabel;
      els.frontPmRoundDate.textContent = dateLabel;
    }

    // retro corners
    els.retroCornerTl.hidden = !isRetro;
    els.retroCornerBr.hidden = !isRetro;
    if (isRetro) {
      els.retroCornerTl.style.borderColor = def.accent + ' transparent transparent transparent';
      els.retroCornerBr.style.borderColor = 'transparent transparent ' + def.accent2 + ' transparent';
    }

    // back layer
    els.backLabel.style.color = def.inkFaint;
    els.backDivider.style.background = def.inkFaint;
    els.messageText.textContent = s.message;
    els.messageText.style.fontFamily = def.handFontFamily;
    els.messageText.style.fontSize = def.handFontSize;
    els.messageText.style.color = def.ink;
    els.fromLineText.textContent = s.fromVal ? '— ' + s.fromVal : '';
    els.fromLineText.style.fontFamily = def.handFontFamily;
    els.fromLineText.style.color = def.ink;

    // stamp
    els.stamp.hidden = s.postageStamp === 'none';
    var stampBg = STAMP_BG[s.postageStamp];
    if (stampBg) {
      els.stamp.style.background = stampBg.background;
      els.stamp.style.border = stampBg.border;
    }
    els.stampSunset.hidden = s.postageStamp !== 's1';
    els.stampMountain.hidden = s.postageStamp !== 's2';

    // back postmark
    els.backPostmark.hidden = s.backPostmark === 'none';
    if (backPm) {
      var bBoxed = backPm.variant === 'boxed';
      var bRings = backPm.variant === 'rings';
      var bBars = backPm.variant === 'bars';
      els.backPmBoxed.hidden = !bBoxed;
      els.backPmRound.hidden = bBoxed;
      els.backPmRings.hidden = !bRings;
      els.backPmBars.hidden = !bBars;
      [els.backPmBoxedText, els.backPmBoxedLine, els.backPmBoxedDate,
       els.backPmRound, els.backPmRings, els.backPmRoundText, els.backPmRoundLine, els.backPmRoundDate].forEach(function (el) { el.style.color = backPm.color; el.style.borderColor = backPm.color; });
      els.backPmBoxedLine.style.background = backPm.color;
      els.backPmRoundLine.style.background = backPm.color;
      Array.prototype.forEach.call(els.backPmBars.children, function (bar) { bar.style.background = backPm.color; });
      els.backPmBoxedText.textContent = backPm.text;
      els.backPmRoundText.textContent = backPm.text;
      els.backPmBoxedDate.textContent = dateLabel;
      els.backPmRoundDate.textContent = dateLabel;
    }

    // to block
    els.toLabel.style.color = def.inkFaint;
    els.toValueText.textContent = s.toVal;
    els.toValueText.style.fontFamily = def.handFontFamily;
    els.toValueText.style.color = def.ink;
    els.toValueText.style.borderColor = def.inkFaint;
    Array.prototype.forEach.call(document.querySelectorAll('.to-blank'), function (el) { el.style.borderColor = def.inkFaint; });
  }

  onResize();
  sync();
})();
</script>
</body>
</html>
